<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐟 Karasik Talk</title>
    <style>
        :root {
            --bg: #f0e6d3;
            --bg2: #e8dcc8;
            --card: rgba(255,255,255,0.95);
            --text: #4a3a2a;
            --text-light: #8b6b4a;
            --border: #f4a460;
            --input-bg: #ffffff;
            --input-border: #f0d5b0;
            --shadow: rgba(0,0,0,0.1);
            --primary: #f4a460;
            --primary-dark: #d4884a;
            --secondary: #1a6a8a;
            --chat-bg: #faf6f0;
            --msg-bg: #f8f0e8;
            --user-bg: #e8f5e8;
            --success: #4a8a4a;
            --danger: #dc2626;
        }
        [data-theme="dark"] {
            --bg: #1a1a2e;
            --bg2: #16162a;
            --card: rgba(30,30,50,0.95);
            --text: #e8d5c0;
            --text-light: #b89a7a;
            --input-bg: #2a2a42;
            --input-border: #3a3a5a;
            --shadow: rgba(0,0,0,0.5);
            --chat-bg: #22223a;
            --msg-bg: #2a2a42;
            --user-bg: #1a3a2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
            color: var(--text);
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: var(--card);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px var(--shadow);
            border: 2px solid var(--border);
            transition: background 0.3s, border 0.3s;
        }
        h1 { color: var(--text); font-size: 2rem; border-left: 5px solid var(--border); padding-left: 16px; margin-bottom: 8px; cursor: pointer; }
        .subtitle { color: var(--text-light); padding-left: 16px; margin-bottom: 20px; cursor: pointer; }
        
        .top-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .top-bar button { background: var(--card); border: 2px solid var(--border); border-radius: 30px; padding: 8px 16px; color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .top-bar button:hover { background: var(--border); color: white; }
        .theme-btn { font-size: 1.2rem; padding: 8px 14px; }
        .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--text); cursor: pointer; transition: 0.2s; padding: 0; }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border: 3px solid var(--border); box-shadow: 0 0 12px var(--border); }
        
        .login-area { background: var(--bg2); padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        .login-area input { width: 100%; padding: 12px; margin: 6px 0; border: 2px solid var(--input-border); border-radius: 30px; font-size: 1rem; background: var(--input-bg); color: var(--text); transition: 0.2s; }
        .login-area input:focus { outline: none; border-color: var(--border); }
        .login-area button { width: 100%; padding: 12px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 6px; transition: 0.2s; }
        .login-area .login-btn { background: var(--primary); color: white; }
        .login-area .login-btn:hover { background: var(--primary-dark); }
        .login-area .register-btn { background: var(--secondary); color: white; }
        
        .user-info { background: var(--user-bg); padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; display: none; align-items: center; gap: 12px; flex-wrap: wrap; }
        .user-info .uname { font-weight: bold; color: var(--text); }
        .user-info .urole { background: var(--primary); padding: 2px 14px; border-radius: 20px; font-size: 0.8rem; color: white; font-weight: bold; }
        .user-info .balance { background: var(--secondary); padding: 2px 14px; border-radius: 20px; font-size: 0.8rem; color: white; font-weight: bold; }
        .user-info .logout-btn { background: var(--danger); border: none; padding: 4px 16px; border-radius: 20px; color: white; cursor: pointer; }
        .user-info .admin-link { background: var(--danger); border: none; padding: 4px 16px; border-radius: 20px; color: white; cursor: pointer; font-size: 0.7rem; text-decoration: none; }
        
        .error-box { background: #fff1f0; border-radius: 16px; padding: 12px; color: #b34e3a; border: 1px solid #ffc6be; margin-top: 8px; }
        .success-box { background: #d4edda; border-radius: 16px; padding: 12px; color: #155724; border: 1px solid #c3e6cb; margin-top: 8px; }
        .loading { text-align: center; padding: 20px; color: var(--text-light); }
        
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 24px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; background: var(--bg2); color: var(--text); transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .passport-card { background: linear-gradient(140deg, var(--bg2), var(--card)); border-radius: 32px; padding: 20px; border: 2px solid var(--border); margin-top: 12px; }
        .passport-card .badge { background: var(--primary); display: inline-block; padding: 6px 16px; border-radius: 40px; font-weight: bold; font-size: 0.75rem; color: white; margin-bottom: 18px; }
        .passport-card .name { font-size: 1.8rem; font-weight: 700; color: var(--text); }
        .passport-card .detail { display: flex; justify-content: space-between; flex-wrap: wrap; border-bottom: 1px dashed var(--input-border); padding: 12px 0; }
        .passport-card .label { font-weight: 600; color: var(--text-light); }
        .passport-card .role-tag { background: var(--primary); padding: 2px 14px; border-radius: 20px; font-size: 0.8rem; color: white; font-weight: bold; }
        
        .chat-list-item { background: var(--bg2); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; border-left: 4px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; cursor: pointer; transition: 0.2s; }
        .chat-list-item:hover { background: var(--input-border); }
        .chat-list-item .cname { font-weight: bold; color: var(--text); }
        .chat-list-item .cmembers { font-size: 0.8rem; color: var(--text-light); }
        
        .chat-box { height: 400px; overflow-y: auto; padding: 16px; background: var(--chat-bg); border-radius: 20px; border: 2px solid var(--input-border); margin-bottom: 16px; }
        .message-item { background: var(--msg-bg); border-radius: 16px; padding: 12px 16px; margin-bottom: 8px; border-left: 4px solid var(--border); }
        .message-item .msg-user { font-weight: bold; color: var(--text); }
        .message-item .msg-time { font-size: 0.65rem; color: var(--text-light); float: right; }
        .message-item .msg-text { margin-top: 4px; color: var(--text); }
        
        .chat-input-area { display: flex; gap: 12px; }
        .chat-input-area input { flex: 1; padding: 14px 18px; border: 2px solid var(--input-border); border-radius: 40px; font-size: 1rem; font-family: inherit; background: var(--input-bg); color: var(--text); }
        .chat-input-area input:focus { outline: none; border-color: var(--border); }
        .chat-input-area button { background: var(--primary); border: none; padding: 0 28px; border-radius: 40px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .chat-input-area button:hover { background: var(--primary-dark); }
        
        .create-chat-area { background: var(--bg2); padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        .create-chat-area input { width: 100%; padding: 10px 16px; margin: 4px 0; border: 2px solid var(--input-border); border-radius: 30px; font-size: 0.95rem; background: var(--input-bg); color: var(--text); }
        .create-chat-area button { width: 100%; padding: 10px; border: none; border-radius: 30px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; margin-top: 4px; transition: 0.2s; }
        
        .announcement-item { background: var(--bg2); border-radius: 16px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--border); }
        .announcement-item h3 { color: var(--text); margin-bottom: 6px; }
        .announcement-item p { color: var(--text-light); }
        .announcement-item small { color: var(--text-light); font-size: 0.7rem; }
        
        .post-item { background: var(--bg2); border-radius: 16px; padding: 16px; margin-bottom: 16px; border-left: 4px solid var(--border); transition: 0.2s; }
        .post-item .post-author { font-weight: bold; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .post-item .post-author .online-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .post-item .post-author .online-indicator.online { background: #4a8a4a; }
        .post-item .post-author .online-indicator.offline { background: #b89a7a; }
        .post-item .post-time { font-size: 0.7rem; color: var(--text-light); margin-left: 8px; }
        .post-item .post-text { margin-top: 8px; color: var(--text); white-space: pre-wrap; word-break: break-word; }
        .post-item .post-actions { display: flex; gap: 16px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
        .post-item .post-actions button { background: none; border: none; cursor: pointer; font-size: 0.9rem; color: var(--text-light); display: flex; align-items: center; gap: 4px; transition: 0.2s; }
        .post-item .post-actions button:hover { color: var(--primary); }
        .post-item .post-actions .liked { color: #e84393; }
        .post-item .post-badge { font-size: 0.65rem; padding: 2px 10px; border-radius: 20px; font-weight: bold; display: inline-block; margin-left: 8px; }
        .post-item .post-badge.new { background: #4a8ad4; color: white; }
        .post-item .post-badge.popular { background: #f4a460; color: white; }
        .post-item .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--input-border); }
        .post-item .comment-item { background: var(--chat-bg); border-radius: 12px; padding: 8px 12px; margin-bottom: 8px; }
        .post-item .comment-item .comment-author { font-weight: bold; color: var(--text); font-size: 0.85rem; }
        .post-item .comment-item .comment-text { color: var(--text); font-size: 0.9rem; margin-top: 2px; }
        .post-item .comment-item .comment-time { font-size: 0.6rem; color: var(--text-light); float: right; }
        .post-item .add-comment-area { display: flex; gap: 8px; margin-top: 8px; }
        .post-item .add-comment-area input { flex: 1; padding: 8px 12px; border: 2px solid var(--input-border); border-radius: 30px; font-size: 0.85rem; background: var(--input-bg); color: var(--text); }
        .post-item .add-comment-area button { background: var(--primary); border: none; padding: 8px 16px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; }
        
        .create-post-area { background: var(--bg2); padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        .create-post-area textarea { width: 100%; padding: 12px; border: 2px solid var(--input-border); border-radius: 16px; background: var(--input-bg); color: var(--text); font-family: inherit; font-size: 0.95rem; resize: vertical; min-height: 80px; }
        .create-post-area textarea:focus { outline: none; border-color: var(--border); }
        .create-post-area button { width: 100%; padding: 10px; border: none; border-radius: 30px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        
        .transfer-item { background: var(--bg2); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; border-left: 3px solid var(--primary); }
        .transfer-item .t-from { font-weight: bold; color: var(--text); }
        .transfer-item .t-to { font-weight: bold; color: var(--secondary); }
        .transfer-item .t-amount { font-weight: bold; color: var(--success); }
        .transfer-item .t-time { font-size: 0.7rem; color: var(--text-light); float: right; }
        
        .admin-panel { background: var(--bg2); border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 2px solid var(--primary); }
        .admin-panel .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .admin-panel .admin-header h3 { color: var(--text); }
        .admin-panel .admin-header button { background: var(--danger); border: none; padding: 4px 12px; border-radius: 20px; color: white; cursor: pointer; }
        .admin-user-item { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--card); border-radius: 12px; margin-bottom: 6px; border-left: 3px solid var(--border); }
        .admin-user-item .login { font-weight: bold; color: var(--text); }
        .admin-user-item .bal { color: var(--text-light); }
        
        footer { text-align: center; color: var(--text-light); font-size: 0.7rem; margin-top: 28px; }
        @media (max-width: 500px) { .card { padding: 16px; } .tabs { gap: 6px; } .tab-btn { padding: 8px 14px; font-size: 0.8rem; } .chat-input-area { flex-direction: column; } .chat-input-area button { padding: 14px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="top-bar">
            <button class="theme-btn" onclick="toggleTheme()">🌙</button>
            <button class="color-btn" style="background:#f4a460;" onclick="setColor('orange')" data-color="orange"></button>
            <button class="color-btn" style="background:#4a8ad4;" onclick="setColor('blue')" data-color="blue"></button>
            <button class="color-btn" style="background:#4aaf4a;" onclick="setColor('green')" data-color="green"></button>
            <button class="color-btn" style="background:#9b59b6;" onclick="setColor('purple')" data-color="purple"></button>
            <button class="color-btn" style="background:#e84393;" onclick="setColor('pink')" data-color="pink"></button>
        </div>
        <h1 onclick="checkAdminAccess()">🐟 Karasik Talk</h1>
        <div class="subtitle" onclick="checkAdminAccess()">🇺🇸 Карасикославия</div>
        
        <div id="adminPanel" class="admin-panel" style="display:none;">
            <div class="admin-header"><h3>👑 Админ-панель</h3><button onclick="document.getElementById('adminPanel').style.display='none'">✕</button></div>
            <div style="margin-bottom:12px;">
                <label style="color:var(--text); font-weight:bold;">➕ Добавить баланс</label>
                <div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;">
                    <input type="text" id="adminUserInput" placeholder="Логин" style="flex:2; padding:8px 12px; border:2px solid var(--input-border); border-radius:30px; background:var(--input-bg); color:var(--text); min-width:100px;">
                    <input type="number" id="adminAmountInput" placeholder="Сумма" style="flex:1; padding:8px 12px; border:2px solid var(--input-border); border-radius:30px; background:var(--input-bg); color:var(--text); min-width:80px;">
                    <button onclick="adminAddBalance()" style="background:var(--primary); border:none; padding:8px 16px; border-radius:30px; color:white; font-weight:bold; cursor:pointer;">💳 Добавить</button>
                </div>
            </div>
            <div id="adminUsersList" style="max-height:200px; overflow-y:auto;"><div class="loading">👥 Загрузка...</div></div>
        </div>
        
        <div class="login-area" id="loginArea">
            <input type="text" id="loginInput" placeholder="Логин">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button class="login-btn" onclick="login()">🔑 Войти</button>
            <button class="register-btn" onclick="register()">📝 Регистрация</button>
            <div id="authStatus"></div>
        </div>
        
        <div id="userInfo" class="user-info">
            <span class="uname" id="userName">Имя</span>
            <span class="urole" id="userRole">Роль</span>
            <span class="balance" id="userBalance">💰 0</span>
            <span style="color:var(--text-light); font-size:0.8rem;" id="userLogin">@логин</span>
            <a href="/admin" class="admin-link" id="adminLink" style="display:none;">👑 Админ</a>
            <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('chats')">💬 Чаты</button>
            <button class="tab-btn" onclick="switchTab('passport')">📋 Паспорт</button>
            <button class="tab-btn" onclick="switchTab('announcements')">📢 Новости</button>
            <button class="tab-btn" onclick="switchTab('posts')">📝 Посты</button>
            <button class="tab-btn" onclick="switchTab('transfers')">💸 Переводы</button>
        </div>
        
        <div id="tab-chats" class="tab-content active">
            <div class="create-chat-area">
                <input type="text" id="chatNameInput" placeholder="Название чата">
                <input type="text" id="chatMemberInput" placeholder="Добавить пользователя (логин)">
                <button onclick="createChat()">➕ Создать чат</button>
            </div>
            <div id="chatsList"><div class="loading">💬 Войдите, чтобы видеть чаты</div></div>
            <div id="chatView" style="display:none; margin-top:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
                    <h3 id="currentChatName" style="color:var(--text);">Чат</h3>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <button onclick="showAddMember()" style="background:var(--secondary); border:none; padding:6px 16px; border-radius:20px; color:white; cursor:pointer; font-size:0.8rem;">➕ Добавить</button>
                        <button onclick="leaveChat()" style="background:var(--danger); border:none; padding:6px 16px; border-radius:20px; color:white; cursor:pointer; font-size:0.8rem;">🚪 Покинуть</button>
                    </div>
                </div>
                <div id="addMemberPanel" style="display:none; background:var(--bg2); padding:12px; border-radius:12px; margin-bottom:12px;">
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="addMemberInput" placeholder="Логин" style="flex:1; padding:8px 12px; border:2px solid var(--input-border); border-radius:30px; font-size:0.9rem; background:var(--input-bg); color:var(--text);">
                        <button onclick="addMemberToChat()" style="background:var(--primary); border:none; padding:8px 16px; border-radius:30px; color:white; font-weight:bold; cursor:pointer;">➕</button>
                        <button onclick="hideAddMember()" style="background:var(--danger); border:none; padding:8px 16px; border-radius:30px; color:white; cursor:pointer;">✕</button>
                    </div>
                </div>
                <div id="chatMessages" class="chat-box"><div class="loading">💬 Загрузка...</div></div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Напиши сообщение..." disabled>
                    <button onclick="sendMessage()" id="sendBtn" disabled>📤 Отправить</button>
                </div>
            </div>
        </div>
        
        <div id="tab-passport" class="tab-content"><div id="passportDisplay"></div></div>
        
        <div id="tab-announcements" class="tab-content">
            <button onclick="loadAnnouncements()" style="background:var(--secondary); border:none; padding:10px 20px; border-radius:30px; color:white; font-weight:bold; cursor:pointer; margin-bottom:12px;">🔄 Загрузить новости</button>
            <div id="announcementsResult"><div class="loading">📢 Нажми "Загрузить новости"</div></div>
        </div>
        
        <div id="tab-posts" class="tab-content">
            <div id="createPostArea" class="create-post-area" style="display:none;">
                <textarea id="postInput" placeholder="Что нового? (макс 500 символов)" maxlength="500"></textarea>
                <button onclick="createPost()">📝 Опубликовать пост</button>
                <div class="disabled-msg" id="postDisabledMsg"></div>
            </div>
            <div id="postsList"><div class="loading">📝 Загрузка постов...</div></div>
        </div>
        
        <div id="tab-transfers" class="tab-content">
            <div style="background:var(--bg2); border-radius:16px; padding:16px; margin-bottom:16px;">
                <h3 style="color:var(--text); margin-bottom:12px;">💸 Перевести монеты</h3>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <input type="text" id="transferToInput" placeholder="Кому" style="flex:2; padding:10px 14px; border:2px solid var(--input-border); border-radius:30px; background:var(--input-bg); color:var(--text); min-width:100px;">
                    <input type="number" id="transferAmountInput" placeholder="Сумма" style="flex:1; padding:10px 14px; border:2px solid var(--input-border); border-radius:30px; background:var(--input-bg); color:var(--text); min-width:80px;">
                    <button onclick="makeTransfer()" style="background:var(--primary); border:none; padding:10px 20px; border-radius:30px; color:white; font-weight:bold; cursor:pointer;">📤 Отправить</button>
                </div>
                <div id="transferStatus"></div>
            </div>
            <div id="transactionsList"><div class="loading">💸 Загрузка транзакций...</div></div>
        </div>
    </div>
    <footer>🐟 Карасикославия · Работает на сервере 🔥</footer>
</div>

<script>
const API_URL = 'http://okak.wisp.byte:9781/api';
let currentUser = null;
let currentChatId = null;
let updateInterval = null;
let adminClickCount = 0;
let adminTimer = null;

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('karasik-theme', newTheme);
    document.querySelector('.theme-btn').textContent = newTheme === 'dark' ? '☀️' : '🌙';
}

function setColor(color) {
    document.documentElement.setAttribute('data-color', color);
    localStorage.setItem('karasik-color', color);
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.color-btn[data-color="'+color+'"]')?.classList.add('active');
}

async function apiFetch(path, method='GET', data=null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (data) opts.body = JSON.stringify(data);
    const res = await fetch(API_URL + path, opts);
    return res.json();
}

function checkAdminAccess() {
    if (!currentUser) { showNotification('Сначала войдите!'); return; }
    const role = currentUser.passport?.role || '';
    if (!role.toLowerCase().includes('админ')) { showNotification('Доступ запрещён!'); return; }
    adminClickCount++;
    if (adminClickCount === 1) {
        adminTimer = setTimeout(() => { adminClickCount = 0; }, 3000);
    }
    if (adminClickCount >= 3) {
        clearTimeout(adminTimer);
        adminClickCount = 0;
        document.getElementById('adminPanel').style.display = 'block';
        loadAdminData();
        showNotification('👑 Админ-панель открыта!');
    }
}

async function loadAdminData() {
    const container = document.getElementById('adminUsersList');
    try {
        const data = await apiFetch('/users');
        if (!data.users) { container.innerHTML = '<div class="loading">👥 Нет пользователей</div>'; return; }
        const keys = Object.keys(data.users);
        let html = '';
        for (const login of keys) {
            const user = data.users[login];
            html += `<div class="admin-user-item"><span class="login">👤 ${login}</span><span class="bal">💰 ${user.balance||0} монет</span></div>`;
        }
        container.innerHTML = html;
    } catch(e) { container.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

async function adminAddBalance() {
    const login = document.getElementById('adminUserInput').value.trim();
    const amount = parseInt(document.getElementById('adminAmountInput').value);
    if (!login || isNaN(amount) || amount <= 0) { showNotification('Введите логин и сумму'); return; }
    try {
        await apiFetch('/admin/balance', 'POST', { login, amount });
        document.getElementById('adminUserInput').value = '';
        document.getElementById('adminAmountInput').value = '';
        loadAdminData();
        updateBalance();
        showNotification(`✅ ${login} получил ${amount} монет!`);
    } catch(e) { showNotification('❌ '+e.message); }
}

async function register() {
    const login = document.getElementById('loginInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();
    const status = document.getElementById('authStatus');
    if (!login || !password) { status.innerHTML = '<div class="error-box">❌ Заполните поля</div>'; return; }
    try {
        await apiFetch('/register', 'POST', { login, password, fullName: login, role: 'Обычный карасик' });
        status.innerHTML = '<div class="success-box">✅ Регистрация успешна!</div>';
    } catch(e) { status.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

async function login() {
    const login = document.getElementById('loginInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();
    const status = document.getElementById('authStatus');
    if (!login || !password) { status.innerHTML = '<div class="error-box">❌ Введите логин и пароль</div>'; return; }
    try {
        const data = await apiFetch('/login', 'POST', { login, password });
        currentUser = data.user;
        localStorage.setItem('karasik_user_login', login);
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('loginArea').style.display = 'none';
        status.innerHTML = '';
        if (currentUser.passport?.role?.toLowerCase().includes('админ')) {
            document.getElementById('adminLink').style.display = 'inline-block';
        }
        showPassport();
        loadChats();
        loadPosts();
        loadTransactions();
        showCreatePostArea();
        updateBalance();
    } catch(e) { status.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

function logout() {
    currentUser = null;
    localStorage.removeItem('karasik_user_login');
    document.getElementById('userInfo').style.display = 'none';
    document.getElementById('loginArea').style.display = 'block';
    document.getElementById('chatView').style.display = 'none';
    document.getElementById('adminLink').style.display = 'none';
    if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
    document.getElementById('chatsList').innerHTML = '<div class="loading">💬 Войдите</div>';
    document.getElementById('postsList').innerHTML = '<div class="loading">📝 Войдите</div>';
    document.getElementById('transactionsList').innerHTML = '<div class="loading">💸 Войдите</div>';
}

async function updateBalance() {
    if (!currentUser) return;
    try {
        const data = await apiFetch(`/users/${currentUser.login}`);
        if (data.user) {
            currentUser.balance = data.user.balance || 0;
            document.getElementById('userBalance').textContent = '💰 ' + (currentUser.balance || 0);
        }
    } catch(e) {}
}

function showPassport() {
    const container = document.getElementById('passportDisplay');
    const p = currentUser.passport;
    if (!p || !p.fullName) {
        container.innerHTML = '<div style="background:#fff3cd; border-radius:16px; padding:16px; color:#856404;">⚠️ Нет паспорта</div>';
        return;
    }
    container.innerHTML = `
        <div class="passport-card">
            <div class="badge">🇺🇸 УДОСТОВЕРЕНИЕ ЛИЧНОСТИ</div>
            <div class="name">${escapeHtml(p.fullName)}</div>
            <div class="detail"><span class="label">👤 Логин</span><span>${escapeHtml(currentUser.login)}</span></div>
            <div class="detail"><span class="label">🏷️ Роль</span><span><span class="role-tag">${escapeHtml(p.role || 'Обычный карасик')}</span></span></div>
            <div class="detail"><span class="label">📅 Дата рождения</span><span>${escapeHtml(p.birthDate || '—')}</span></div>
            <div class="detail"><span class="label">💰 Баланс</span><span style="font-weight:bold; color:var(--success);">${currentUser.balance||0} монет</span></div>
            <div style="margin-top:16px; text-align:center; font-size:0.8rem; color:var(--text-light);">🐟 Карасикославия</div>
        </div>
    `;
    document.getElementById('userName').textContent = p.fullName || currentUser.login;
    document.getElementById('userRole').textContent = p.role || 'Обычный карасик';
    document.getElementById('userLogin').textContent = '@' + currentUser.login;
}

async function loadChats() {
    if (!currentUser) return;
    const container = document.getElementById('chatsList');
    container.innerHTML = '🔄 Загрузка...';
    try {
        const data = await apiFetch('/chats');
        const chats = data.chats || {};
        const userChats = [];
        for (const [id, chat] of Object.entries(chats)) {
            if (chat.members && chat.members.includes(currentUser.login)) {
                userChats.push({ id, ...chat });
            }
        }
        if (userChats.length === 0) {
            container.innerHTML = '<div class="loading">💬 Ты не участвуешь ни в одном чате</div>';
            return;
        }
        container.innerHTML = userChats.map(chat => `
            <div class="chat-list-item" onclick="openChat('${chat.id}')">
                <span class="cname">${escapeHtml(chat.name)}</span>
                <span class="cmembers">👥 ${chat.members ? chat.members.join(', ') : ''}</span>
            </div>
        `).join('');
    } catch(e) { container.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

async function createChat() {
    if (!currentUser) { showNotification('Сначала войдите!'); return; }
    const name = document.getElementById('chatNameInput').value.trim();
    const member = document.getElementById('chatMemberInput').value.trim();
    if (!name || !member) { showNotification('Заполните все поля'); return; }
    if (member === currentUser.login) { showNotification('Нельзя добавить себя'); return; }
    try {
        await apiFetch('/chats', 'POST', { name, member, from_user: currentUser.login });
        document.getElementById('chatNameInput').value = '';
        document.getElementById('chatMemberInput').value = '';
        loadChats();
        showNotification(`Чат "${name}" создан!`);
    } catch(e) { showNotification('❌ '+e.message); }
}

function openChat(chatId) {
    currentChatId = chatId;
    document.getElementById('chatView').style.display = 'block';
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    loadMessages(chatId);
    if (updateInterval) clearInterval(updateInterval);
    updateInterval = setInterval(() => {
        if (currentChatId === chatId) loadMessages(chatId, true);
    }, 3000);
}

async function loadMessages(chatId, silent = false) {
    const container = document.getElementById('chatMessages');
    const nameEl = document.getElementById('currentChatName');
    try {
        const data = await apiFetch(`/chats/${chatId}`);
        const chat = data.chat;
        if (!chat) { container.innerHTML = '<div class="error-box">❌ Чат не найден</div>'; return; }
        nameEl.textContent = chat.name || 'Чат';
        const messages = chat.messages || {};
        const keys = Object.keys(messages);
        if (keys.length === 0) {
            if (!silent) container.innerHTML = '<div class="loading">💬 Сообщений пока нет</div>';
            return;
        }
        const sorted = keys.sort((a, b) => (messages[a].timestamp || 0) - (messages[b].timestamp || 0));
        let html = sorted.map(id => {
            const m = messages[id];
            return `<div class="message-item"><span class="msg-user">${escapeHtml(m.from)}</span><span class="msg-time">${m.timestamp ? new Date(m.timestamp).toLocaleString() : ''}</span><div class="msg-text">${escapeHtml(m.text)}</div></div>`;
        }).join('');
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    } catch(e) { if (!silent) container.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

async function sendMessage() {
    if (!currentUser || !currentChatId) { showNotification('Выберите чат'); return; }
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    try {
        await apiFetch(`/chats/${currentChatId}/messages`, 'POST', { text, from_user: currentUser.login });
        input.value = '';
        loadMessages(currentChatId);
    } catch(e) { showNotification('❌ '+e.message); }
}

function showAddMember() {
    document.getElementById('addMemberPanel').style.display = 'block';
    document.getElementById('addMemberInput').focus();
}
function hideAddMember() {
    document.getElementById('addMemberPanel').style.display = 'none';
    document.getElementById('addMemberInput').value = '';
}

async function addMemberToChat() {
    if (!currentUser || !currentChatId) { showNotification('Сначала выберите чат'); return; }
    const login = document.getElementById('addMemberInput').value.trim();
    if (!login) { showNotification('Введите логин'); return; }
    if (login === currentUser.login) { showNotification('Нельзя добавить себя'); return; }
    try {
        await apiFetch(`/chats/${currentChatId}/join`, 'POST', { login });
        document.getElementById('addMemberInput').value = '';
        hideAddMember();
        loadMessages(currentChatId);
        loadChats();
        showNotification(`✅ ${login} добавлен в чат!`);
    } catch(e) { showNotification('❌ '+e.message); }
}

async function leaveChat() {
    if (!currentChatId) return;
    if (!confirm('Покинуть чат?')) return;
    try {
        await apiFetch(`/chats/${currentChatId}`, 'DELETE');
        currentChatId = null;
        document.getElementById('chatView').style.display = 'none';
        document.getElementById('messageInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
        loadChats();
    } catch(e) { showNotification('❌ '+e.message); }
}

async function loadAnnouncements() {
    const container = document.getElementById('announcementsResult');
    container.innerHTML = '🔄 Загрузка...';
    try {
        const data = await apiFetch('/announcements');
        const items = Object.values(data.announcements || {}).filter(a => a && a.active !== false);
        if (items.length === 0) { container.innerHTML = '<div class="error-box">📭 Нет новостей</div>'; return; }
        container.innerHTML = items.map(a => `
            <div class="announcement-item"><h3>📌 ${escapeHtml(a.title)}</h3><p>${escapeHtml(a.text)}</p><small>📅 ${escapeHtml(a.date || 'Недавно')}</small></div>
        `).join('');
    } catch(e) { container.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

function showCreatePostArea() {
    const container = document.getElementById('createPostArea');
    if (currentUser && currentUser.passport && currentUser.passport.fullName) {
        container.style.display = 'block';
        document.getElementById('postDisabledMsg').textContent = '';
        document.getElementById('postInput').disabled = false;
    } else {
        container.style.display = 'block';
        document.getElementById('postDisabledMsg').textContent = '⚠️ У вас нет паспорта';
        document.getElementById('postInput').disabled = true;
    }
}

async function loadPosts() {
    const container = document.getElementById('postsList');
    container.innerHTML = '🔄 Загрузка...';
    try {
        const data = await apiFetch('/posts');
        const posts = data.posts || {};
        const keys = Object.keys(posts);
        if (keys.length === 0) { container.innerHTML = '<div class="loading">📝 Нет постов</div>'; return; }
        const sorted = keys.sort((a,b) => (posts[b].timestamp||0) - (posts[a].timestamp||0));
        let html = '';
        for (const key of sorted) {
            const post = posts[key];
            const likes = post.likes || 0;
            const comments = post.comments || {};
            const cKeys = Object.keys(comments);
            const timeAgo = getTimeAgo(post.timestamp);
            const isNew = (Date.now() - (post.timestamp||0)) < 3600000;
            const isPopular = likes >= 5;
            let badge = '';
            if (isNew) badge += `<span class="post-badge new">Новый</span>`;
            if (isPopular) badge += `<span class="post-badge popular">🔥 Популярный</span>`;
            const isLiked = currentUser && post.likedBy && post.likedBy[currentUser.login];
            html += `
                <div class="post-item">
                    <div class="post-author">
                        <span>${escapeHtml(post.author)}</span>
                        ${badge}<span class="post-time">${timeAgo}</span>
                    </div>
                    <div class="post-text">${escapeHtml(post.text)}</div>
                    <div class="post-actions">
                        <button onclick="likePost('${key}')" class="${isLiked ? 'liked' : ''}">❤️ <span id="likes-${key}">${likes}</span></button>
                        <button onclick="toggleComments('${key}')">💬 <span id="comments-count-${key}">${cKeys.length}</span></button>
                    </div>
                    <div class="comments-section" id="comments-${key}" style="display:none;">
                        ${cKeys.map(cid => {
                            const c = comments[cid];
                            return `<div class="comment-item"><span class="comment-author">${escapeHtml(c.author)}</span><span class="comment-time">${getTimeAgo(c.timestamp)}</span><div class="comment-text">${escapeHtml(c.text)}</div></div>`;
                        }).join('')}
                        <div class="add-comment-area">
                            <input type="text" placeholder="Написать комментарий..." id="comment-input-${key}">
                            <button onclick="addComment('${key}')">📤</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    } catch(e) { container.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

async function createPost() {
    if (!currentUser) { showNotification('Сначала войдите!'); return; }
    if (!currentUser.passport || !currentUser.passport.fullName) { showNotification('У вас нет паспорта!'); return; }
    const input = document.getElementById('postInput');
    const text = input.value.trim();
    if (!text) return;
    if (text.length > 500) { showNotification('Максимум 500 символов'); return; }
    try {
        await apiFetch('/posts', 'POST', { text, author: currentUser.login });
        input.value = '';
        loadPosts();
        showNotification('Пост опубликован!');
    } catch(e) { showNotification('❌ '+e.message); }
}

async function likePost(postId) {
    if (!currentUser) { showNotification('Сначала войдите!'); return; }
    try {
        await apiFetch(`/posts/${postId}/like`, 'PUT', { login: currentUser.login });
        loadPosts();
    } catch(e) { showNotification('❌ '+e.message); }
}

function toggleComments(postId) {
    const el = document.getElementById('comments-'+postId);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function addComment(postId) {
    if (!currentUser) { showNotification('Сначала войдите!'); return; }
    const input = document.getElementById('comment-input-'+postId);
    const text = input.value.trim();
    if (!text) return;
    try {
        await apiFetch(`/posts/${postId}/comments`, 'POST', { text, author: currentUser.login });
        input.value = '';
        loadPosts();
    } catch(e) { showNotification('❌ '+e.message); }
}

async function makeTransfer() {
    if (!currentUser) { showNotification('Сначала войдите!'); return; }
    const to = document.getElementById('transferToInput').value.trim();
    const amount = parseInt(document.getElementById('transferAmountInput').value);
    const status = document.getElementById('transferStatus');
    if (!to || isNaN(amount) || amount <= 0) { status.innerHTML = '<div class="error-box">❌ Введите получателя и сумму</div>'; return; }
    if (to === currentUser.login) { status.innerHTML = '<div class="error-box">❌ Нельзя перевести себе</div>'; return; }
    try {
        await apiFetch('/transfer', 'POST', { from_user: currentUser.login, to, amount });
        document.getElementById('transferToInput').value = '';
        document.getElementById('transferAmountInput').value = '';
        status.innerHTML = '<div class="success-box">✅ Перевод выполнен!</div>';
        setTimeout(() => status.innerHTML = '', 3000);
        updateBalance();
        loadTransactions();
        showNotification(`✅ Переведено ${amount} монет ${to}`);
    } catch(e) { status.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

async function loadTransactions() {
    if (!currentUser) { document.getElementById('transactionsList').innerHTML = '<div class="loading">💸 Войдите</div>'; return; }
    const container = document.getElementById('transactionsList');
    try {
        const data = await apiFetch('/transactions');
        const txs = data.transactions || {};
        const keys = Object.keys(txs);
        if (keys.length === 0) { container.innerHTML = '<div class="loading">💸 Нет транзакций</div>'; return; }
        const userTxs = keys.filter(id => {
            const tx = txs[id];
            return tx.from === currentUser.login || tx.to === currentUser.login;
        }).sort((a,b) => (txs[b].timestamp||0) - (txs[a].timestamp||0));
        if (userTxs.length === 0) { container.innerHTML = '<div class="loading">💸 У вас пока нет транзакций</div>'; return; }
        container.innerHTML = userTxs.map(id => {
            const tx = txs[id];
            const isIncoming = tx.to === currentUser.login;
            const sign = isIncoming ? '+' : '-';
            const color = isIncoming ? 'var(--success)' : 'var(--danger)';
            return `<div class="transfer-item"><span class="t-from">${escapeHtml(tx.from)}</span> ${isIncoming ? '→' : '←'} <span class="t-to">${escapeHtml(tx.to)}</span> <span style="color:${color}; font-weight:bold;">${sign}${tx.amount} 💰</span> <span class="t-time">${getTimeAgo(tx.timestamp)}</span></div>`;
        }).join('');
    } catch(e) { container.innerHTML = `<div class="error-box">❌ ${e.message}</div>`; }
}

function getTimeAgo(timestamp) {
    if (!timestamp) return 'только что';
    const diff = Date.now() - timestamp;
    const s = Math.floor(diff / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (s < 60) return s + ' сек назад';
    if (m < 60) return m + ' мин назад';
    if (h < 24) return h + ' ч назад';
    return d + ' дн назад';
}

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.querySelector('.tab-btn[onclick="switchTab(\''+tab+'\')"]').classList.add('active');
    if (tab === 'posts' && currentUser) { loadPosts(); showCreatePostArea(); }
    if (tab === 'transfers' && currentUser) { loadTransactions(); }
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
function showNotification(msg) { console.log('🐟', msg); }

// ===== АВТОВХОД =====
document.addEventListener('DOMContentLoaded', function() {
    const theme = localStorage.getItem('karasik-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelector('.theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
    const color = localStorage.getItem('karasik-color') || 'orange';
    document.documentElement.setAttribute('data-color', color);
    document.querySelector('.color-btn[data-color="'+color+'"]')?.classList.add('active');
    
    const saved = localStorage.getItem('karasik_user_login');
    if (saved) {
        document.getElementById('loginInput').value = saved;
        setTimeout(() => {
            login();
        }, 500);
    }
});
</script>
